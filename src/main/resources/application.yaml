spring:
  ai:
    openai:
      api-key: ${GROQ_API_KEY}  # ← Volver a Groq
      base-url: https://api.groq.com/openai  # ← Volver a Groq
      chat:
        options:
          model: llama-3.3-70b-versatile  # ← Volver a Llama 3.3
          temperature: 0.7
      embedding:
        enabled: false

    ollama:
      base-url: http://localhost:11434
      chat:
        enabled: false
      embedding:
        enabled: true
        options:
          model: nomic-embed-text

  vectorstore:
    pgvector:
      dimensions: 768
      distance-type: cosine_distance
      index-type: HNSW
      initialize-schema: true

  datasource:
    url: jdbc:postgresql://localhost:5432/tumarca
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  sql:
    init:
      mode: always

  mail:
    host: smtp.gmail.com
    port: 587
    username: infoplataformaweb@gmail.com
    password: ijfn tupa xird pfij
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

logging:
  level:
    org.springframework.ai: DEBUG
    ar.tumarca.backend: DEBUG

server:
  port: 8080


