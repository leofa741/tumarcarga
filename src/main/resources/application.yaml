spring:
  ai:
    openai:
      api-key: ${GROQ_API_KEY}
      base-url: https://api.groq.com/openai
      chat:
        options:
          model: llama-3.3-70b-versatile
          temperature: 0.7
      embedding:
        enabled: false  # ← Deshabilitar embeddings de OpenAI

    ollama:
      base-url: http://localhost:11434
      chat:
        enabled: false  # ← Deshabilitar chat de Ollama
      embedding:
        enabled: true   # ← Habilitar SOLO embeddings de Ollama
        options:
          model: nomic-embed-text

  vectorstore:
    pgvector:
      dimensions: 768
      distance-type: cosine_distance
      index-type: HNSW
      initialize-schema: true

  datasource:
    url: jdbc:postgresql://localhost:5432/tumarca
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  sql:
    init:
      mode: always

server:
  port: 8080